<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Solicitudes</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

button{
padding:6px 10px;
cursor:pointer;
margin-right:4px;
}
</style>

</head>
<body>

<h2>Solicitudes de Actualización</h2>

<table>

<thead>
<tr>
<th>Estado</th>
<th>Nombre</th>
<th>Documento</th>
<th>Correo</th>
<th>Archivo</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla">
</tbody>

</table>

<script>

const SUPABASE_URL =
"https://wkuntngatmjxjqxapcgu.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrdW50bmdhdG1qeGpxeGFwY2d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTcwOTksImV4cCI6MjA5Nzg3MzA5OX0.2Kjch8K_chweQCEDGsB9sRhALNNIzaePXceLZs8jGzs";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function cargar(){

const {data,error} =
await supabaseClient
.from('solicitudes_actualizacion')
.select('*')
.order('id',{ascending:false});

let html='';

data.forEach(row=>{

html += `
<tr>

<td>${row.estado}</td>

<td>${row.nombre}</td>

<td>${row.numdoc}</td>

<td>${row.correo}</td>

<td>
<a href="${row.documento_url}"
target="_blank">
Ver
</a>
</td>

<td>

<button onclick="cambiarEstado(${row.id},'Aprobado')">
Aprobar
</button>

<button onclick="cambiarEstado(${row.id},'Rechazado')">
Rechazar
</button>

<button onclick="cambiarEstado(${row.id},'En Proceso')">
Proceso
</button>

</td>

</tr>
`;

});

document.getElementById('tabla').innerHTML=html;

}

async function cambiarEstado(id,estado){

await supabaseClient
.from('solicitudes_actualizacion')
.update({
estado:estado,
fecha_gestion:new Date()
})
.eq('id',id);

cargar();

}

cargar();

</script>

</body>
</html>
